services:
  portfolio:
    image: ghcr.io/officialxndr/xndr-portfolio:latest
    pull_policy: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Generate with: openssl rand -hex 32
      JWT_SECRET: "change-me-to-a-long-random-secret"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: "change-me"
    volumes:
      - /mnt/tank/docker_apps/xndr-portfolio/data:/app/data
      - /mnt/tank/docker_apps/xndr-portfolio/uploads:/app/public/uploads
    restart: unless-stopped

x-truenas:
  portals:
    - name: Web UI
      scheme: http
      host: $node_ip
      port: 3001
      path: /
